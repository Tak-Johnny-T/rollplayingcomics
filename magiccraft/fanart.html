<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fan Arts｜THE MAGIC CRAFT</title>
<meta name="description" content="THE MAGIC CRAFT に頂いたファンアートの紹介です。">
<meta property="og:title" content="Fan Arts｜THE MAGIC CRAFT">
<meta property="og:type" content="article">
<meta property="og:image" content="../assets/img/fanart_01_waga.webp">
<style>
  :root{
    --bg:#ffffff;--bg2:#f6f7f8;--ink:#1b1e22;--muted:#666e74;--line:#e6e8ea;
    --cyan:#0f8b8d;--amber:#c1741f;
    --maxw:1080px;
    --display:"Futura","Century Gothic","Avenir Next","Segoe UI",system-ui,sans-serif;
    --body:"Noto Sans JP","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#14171a;--bg2:#1b1f23;--ink:#eceef0;--muted:#98a0a6;--line:#2a2f34;--cyan:#3fb7b9;--amber:#d98f3f}
  }
  :root[data-theme="light"]{--bg:#ffffff;--bg2:#f6f7f8;--ink:#1b1e22;--muted:#666e74;--line:#e6e8ea;--cyan:#0f8b8d;--amber:#c1741f}
  :root[data-theme="dark"]{--bg:#14171a;--bg2:#1b1f23;--ink:#eceef0;--muted:#98a0a6;--line:#2a2f34;--cyan:#3fb7b9;--amber:#d98f3f}

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.8;-webkit-font-smoothing:antialiased}
  img{max-width:100%;height:auto;display:block}
  a{color:inherit;text-decoration:none}

  .hd{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .hd-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:14px 24px}
  .logo{font-family:var(--display);font-weight:800;letter-spacing:.14em;font-size:15px}
  .logo .ci{color:var(--cyan)}
  .back{font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap}
  .back:hover{color:var(--ink)}

  section.block{max-width:var(--maxw);margin:0 auto;padding:clamp(32px,5vw,52px) 24px}
  .eyebrow{margin:0 0 8px;font-family:var(--display);font-weight:700;letter-spacing:.24em;font-size:12px;color:var(--cyan)}
  h1.t{margin:0 0 10px;font-family:var(--display);font-weight:800;font-size:clamp(22px,3.2vw,30px);letter-spacing:.02em}
  .lead{margin:0;color:var(--muted);font-size:14px}

  /* 縦横比がバラバラなので段組みで流し込む（トリミングしない） */
  .gallery{margin-top:30px;columns:3;column-gap:22px}
  @media(max-width:860px){.gallery{columns:2}}
  @media(max-width:520px){.gallery{columns:1}}
  .art{break-inside:avoid;margin:0 0 22px}
  .art img{width:100%;border-radius:10px;background:var(--bg2)}
  .art figcaption{margin-top:8px;font-size:12.5px;color:var(--muted);text-align:right}

  .back-btm{max-width:var(--maxw);margin:0 auto;padding:0 24px clamp(32px,5vw,52px);text-align:center}
  .btn{display:inline-flex;align-items:center;gap:.5em;padding:11px 22px;border-radius:6px;
    border:1.5px solid var(--line);color:var(--muted);font-weight:700;font-size:14px;transition:.2s}
  .btn:hover{background:var(--bg2);color:var(--ink)}

  footer{border-top:1px solid var(--line);background:var(--bg2)}
  .ft-in{max-width:var(--maxw);margin:0 auto;padding:30px 24px;text-align:center;color:var(--muted);font-size:12.5px}
  .ft-in a{color:var(--cyan)}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-in">
    <a class="back" href="./">◂ THE MAGIC CRAFT</a>
    <a class="logo" href="../">THE ROLLPLAYING <span class="ci">COMICS</span></a>
  </div>
</header>

<section class="block">
  <p class="eyebrow">Fan Arts</p>
  <h1 class="t">THE MAGIC CRAFT</h1>
  <p class="lead">プレイして頂いた方々からめちゃくちゃ素敵なファンアートを頂きました。<br>本当にありがとうございます！</p>

  <div class="gallery">
    <figure class="art">
      <img src="../assets/img/fanart_01_waga.webp" width="620" height="791" alt="ファンアート（わがさま）">
      <figcaption>わが さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_02_yumemishi.webp" width="450" height="600" alt="ファンアート（夢観士さま）" loading="lazy">
      <figcaption>夢観士 さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_03_awaragi.webp" width="683" height="960" alt="ファンアート（アワラギさま）" loading="lazy">
      <figcaption>アワラギ さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_04_kyujinrui.webp" width="490" height="314" alt="ファンアート（旧人類さま）" loading="lazy">
      <figcaption>旧人類 さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_05_rikka.webp" width="1200" height="750" alt="ファンアート（六夏さま）" loading="lazy">
      <figcaption>六夏 さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_06_nito.webp" width="1200" height="956" alt="ファンアート（二トーさま）" loading="lazy">
      <figcaption>二トー さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_07_amayadori.webp" width="960" height="640" alt="ファンアート（雨宿りさま）" loading="lazy">
      <figcaption>雨宿り さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_08_tsukikusa.webp" width="1200" height="982" alt="ファンアート（月草ひつじさま）" loading="lazy">
      <figcaption>月草ひつじ さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_09_angura.webp" width="960" height="640" alt="ファンアート（アングラ人鳥歌劇展さま）" loading="lazy">
      <figcaption>アングラ人鳥歌劇展 さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_10_enichiyo.webp" width="630" height="800" alt="ファンアート（縁ちよさま）" loading="lazy">
      <figcaption>縁ちよ さま</figcaption>
    </figure>
    <figure class="art">
      <img src="../assets/img/fanart_11_waga2.webp" width="576" height="782" alt="ファンアート（わがさま）" loading="lazy">
      <figcaption>わが さま</figcaption>
    </figure>
  </div>
</section>

<div class="back-btm">
  <a class="btn" href="./">◂ THE MAGIC CRAFT に戻る</a>
</div>

<footer>
  <div class="ft-in">
    <a href="../">◂ TOPへ戻る</a>　｜　© 2026 T.Johnny T. All Rights Reserved.
  </div>
</footer>

</body>
</html>
